<!doctype html>
<html lang="en" data-bs-theme="dark" >
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>To do App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>

    <h1>Welcome to My To do app</h1> 
    Tasks : <br>

   <a href = "addtask"> <button type="button" class="btn btn-primary">Add</button></a> <br>
    
  
      
    {% for i in tasksobj %}

  
    <div class="card" style="width: 30rem;">
  <div class="card-body">
    <h5 class="card-title">Tittle : {{i.tittle}} <br></h5>
    <p class="card-text">

     Description : {{i.detail}} <br>
     Status : {{i.status}} <br>


    <form method ="POST" action = "{% url 'deletetask'%}">
      {% csrf_token %}
    <input type ="hidden" value = '{{i.id}}' name ="id">
    <button type="sumbit" class="btn btn-primary">Delete</button>
    </form>

     <form method = "get" action ="{% url 'edittask'%}">
      {% csrf_token %}
      <input type = "hidden" value = "{{i.id}}" name = "id2" >
    <button type="sumbit" class="btn btn-primary"> Edit</button>
    </form>


    <form method ="POST" action = "{% url 'markcompleted'%}"" >
      {% csrf_token %}
      <input type = "hidden" value ="{{i.id}}" name = "id1">
    <button type="sumbit" class="btn btn-primary">mark completed</button>
    </form>
     
   

    </p>
  
  </div>
</div>




     
    {% endfor %}

    

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
